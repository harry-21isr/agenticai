name: AI Docs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  update-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Debug API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Key starts with: ${OPENAI_API_KEY:0:7}"

      - name: Run AI docs update
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const { execSync } = require('child_process');
            const diff = execSync('git diff origin/main...HEAD').toString().slice(0, 8000);
            
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'gpt-4o',
                messages: [{ role: 'user', content: `Analyze this diff against main branch and update AGENTS.md, docs, and skills accordingly. Suggest doc updates:\n${diff}` }]
              })
            });

            const data = await res.json();
            console.log(data.choices[0].message.content);

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # Checkout the actual PR branch
          git checkout ${{ github.head_ref }}
          
          git add .
          
          # Only commit if there are actual changes
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "AI update docs" &&
            git push origin ${{ github.head_ref }}
          )


      - name: Generate PR summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff origin/main...HEAD | head -c 8000 > diff.txt

          # Write payload to file to avoid JSON escaping issues
          node -e "
            const diff = require('fs').readFileSync('diff.txt', 'utf8');
            const payload = {
              model: 'gpt-4o',
              messages: [{ 
                role: 'user', 
                content: 'Analyze this git diff and generate a concise PR summary:\n\n' + diff 
              }]
            };
            require('fs').writeFileSync('payload.json', JSON.stringify(payload));
          "

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          SUMMARY=$(echo "$RESPONSE" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            if (d.error) { console.error('API Error:', d.error.message); process.exit(1); }
            console.log(d.choices[0].message.content);
          ")

          gh pr edit ${{ github.event.pull_request.number }} \
            --body "$SUMMARY"