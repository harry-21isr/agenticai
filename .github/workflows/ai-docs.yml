name: AI Docs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  update-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run AI docs update
        env:
          KEY: ${{ secrets.KEY }}
        run: |
          codex exec "
          Read .ai/prompts/update-docs.md
          Analyze git diff against main branch
          Update AGENTS.md, docs, and skills accordingly
          "

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git diff --quiet && echo "No changes" || git commit -m "AI update docs"
          git push

      - name: Generate PR summary
        env:
          KEY: ${{ secrets.KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(codex exec "Analyze git diff and generate concise PR summary")
          gh pr edit ${{ github.event.pull_request.number }} \
            --body "$SUMMARY"