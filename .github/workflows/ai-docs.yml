name: AI Docs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  update-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Debug API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Key starts with: ${OPENAI_API_KEY:0:7}"

      - name: Run AI docs update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git diff origin/main...HEAD | head -c 8000 > diff.txt

          node << 'EOF'
          const fs = require('fs');
          const https = require('https');

          const diff = fs.readFileSync('diff.txt', 'utf8');
          const today = new Date().toISOString().split('T')[0];

          async function callAI(prompt, outfile) {
            const existing = fs.existsSync(outfile) ? fs.readFileSync(outfile, 'utf8') : '';

            const payload = JSON.stringify({
              model: 'gpt-4o',
              messages: [{
                role: 'user',
                content: prompt + '\n\nExisting file:\n' + existing + '\n\nGit diff:\n' + diff + '\n\nRespond with ONLY the full updated file content, no markdown fences.'
              }]
            });

            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'api.openai.com',
                path: '/v1/chat/completions',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`
                }
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  const json = JSON.parse(data);
                  if (json.error) { console.error('API Error:', json.error.message); process.exit(1); }
                  fs.writeFileSync(outfile, json.choices[0].message.content);
                  console.log('Updated:', outfile);
                  resolve();
                });
              });
              req.on('error', reject);
              req.write(payload);
              req.end();
            });
          }

          async function main() {
            await callAI(
              `You are updating AGENTS.md, a coding assistant context file for a Next.js 16 project.
              Based on the diff, update only the relevant sections (Stack, Architecture, Breaking Changes, Commands, Gotchas).
              Keep all existing content. Only modify sections affected by the diff.
              Preserve the exact markdown format and structure of the original file.`,
              'AGENTS.md'
            );

            await callAI(
              `You are updating CHANGELOG.md for a Next.js 16 project.
              Based on the git diff, prepend a new entry at the very top using this exact format:

              ## [${today}]

              ### Added
              - feature or change added
              - files/folders affected: path/to/file

              ### Removed
              - feature or change removed
              - files/folders affected: path/to/file

              ### Updated
              - feature or change updated
              - files/folders affected: path/to/file

              ---

              Rules:
              - NEVER modify or remove any existing changelog entries below the new one
              - Only include sections (Added/Removed/Updated) that actually have changes
              - Be specific and concise per bullet
              - Respond with the FULL file content (new entry + all existing entries unchanged)`,
                            'CHANGELOG.md'
                          );
                        }

                        main().catch(err => { console.error(err); process.exit(1); });
              EOF

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout ${{ github.head_ref }}

          git add AGENTS.md CHANGELOG.md

          git diff --staged --quiet && echo "No changes" || (
            git commit -m "AI: update AGENTS.md, CHANGELOG.md" &&
            git push origin ${{ github.head_ref }}
          )




      - name: Generate PR summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff origin/main...HEAD | head -c 8000 > diff.txt

          # Write payload to file to avoid JSON escaping issues
          node -e "
            const diff = require('fs').readFileSync('diff.txt', 'utf8');
            const payload = {
              model: 'gpt-4o',
              messages: [{ 
                role: 'user', 
                content: 'Analyze this git diff and generate a concise PR summary:\n\n' + diff 
              }]
            };
            require('fs').writeFileSync('payload.json', JSON.stringify(payload));
          "

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          SUMMARY=$(echo "$RESPONSE" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            if (d.error) { console.error('API Error:', d.error.message); process.exit(1); }
            console.log(d.choices[0].message.content);
          ")

          gh pr edit ${{ github.event.pull_request.number }} \
            --body "$SUMMARY"