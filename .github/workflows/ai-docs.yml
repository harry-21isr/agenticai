name: AI Docs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  update-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Debug API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Key starts with: ${OPENAI_API_KEY:0:7}"

      - name: Run AI docs update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git diff origin/main...HEAD | head -c 8000 > diff.txt

          # Function to call OpenAI and write to a file
          call_ai() {
            local prompt="$1"
            local outfile="$2"

            node -e "
              const diff = require('fs').readFileSync('diff.txt', 'utf8');
              const payload = {
                model: 'gpt-4o',
                messages: [{ 
                  role: 'user', 
                  content: \`$prompt\n\nGit diff:\n\` + diff + '\n\nRespond with ONLY the file content, no explanations or markdown fences.'
                }]
              };
              require('fs').writeFileSync('payload.json', JSON.stringify(payload));
            "

            curl -s https://api.openai.com/v1/chat/completions \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -H "Content-Type: application/json" \
              -d @payload.json | node -e "
                const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                if (d.error) { console.error('API Error:', d.error.message); process.exit(1); }
                require('fs').writeFileSync('$outfile', d.choices[0].message.content);
                console.log('Updated: $outfile');
              "
          }

          call_ai "Update AGENTS.md to reflect new agents, their roles, inputs, outputs, and tools based on the diff." "AGENTS.md"

          call_ai "Update SKILLS.md to reflect any new or modified skills/tools used by agents based on the diff." "SKILLS.md"

          call_ai "Update CHANGELOG.md by prepending a new entry for today $(date +%Y-%m-%d) describing what changed based on the diff. Keep existing entries." "CHANGELOG.md"


      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout ${{ github.head_ref }}

          git add AGENTS.md SKILLS.md CHANGELOG.md

          git diff --staged --quiet && echo "No changes" || (
            git commit -m "AI: update AGENTS.md, SKILLS.md, CHANGELOG.md" &&
            git push origin ${{ github.head_ref }}
          )

      - name: Generate PR summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff origin/main...HEAD | head -c 8000 > diff.txt

          # Write payload to file to avoid JSON escaping issues
          node -e "
            const diff = require('fs').readFileSync('diff.txt', 'utf8');
            const payload = {
              model: 'gpt-4o',
              messages: [{ 
                role: 'user', 
                content: 'Analyze this git diff and generate a concise PR summary:\n\n' + diff 
              }]
            };
            require('fs').writeFileSync('payload.json', JSON.stringify(payload));
          "

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          SUMMARY=$(echo "$RESPONSE" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            if (d.error) { console.error('API Error:', d.error.message); process.exit(1); }
            console.log(d.choices[0].message.content);
          ")

          gh pr edit ${{ github.event.pull_request.number }} \
            --body "$SUMMARY"