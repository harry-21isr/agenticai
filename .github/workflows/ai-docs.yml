name: AI Docs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  update-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run AI docs update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git diff origin/main...HEAD | head -c 8000 > diff.txt

          # Function to call OpenAI and write to a file
          call_ai() {
            local prompt="$1"
            local outfile="$2"

            # Write prompt to file to avoid special-character escaping issues
            printf '%s' "$prompt" > prompt.txt

            node -e "
              const diff = require('fs').readFileSync('diff.txt', 'utf8');
              const prompt = require('fs').readFileSync('prompt.txt', 'utf8');
              const payload = {
                model: 'gpt-4o',
                messages: [{ 
                  role: 'user', 
                  content: prompt + '\n\nGit diff:\n' + diff + '\n\nRespond with ONLY the file content, no explanations or markdown fences.'
                }]
              };
              require('fs').writeFileSync('payload.json', JSON.stringify(payload));
            "

            curl -s https://api.openai.com/v1/chat/completions \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -H "Content-Type: application/json" \
              -d @payload.json > response.json

            node -e "
              const d = JSON.parse(require('fs').readFileSync('response.json', 'utf8'));
              if (d.error) { console.error('API Error:', d.error.message); process.exit(1); }
              process.stdout.write(d.choices[0].message.content);
            " > "$outfile"
            echo "Updated: $outfile"
          }

          call_ai "You are updating AGENTS.md for this Node.js email template build toolchain project.
          Based on the git diff, update only the affected sections.

          Rules:
          - Keep the markdown structure stable
          - Keep unrelated text byte-for-byte when possible
          - Prefer minimal diffs
          - Do not reorder sections
          - Do not add speculative documentation
          - If diff does not affect developer workflow, return original file unchanged
          - Removed features should be marked as deprecated, not deleted, to preserve historical context

          Focus on operational guidance for AI agents working in this repository.
          Respond with the FULL updated file content." "AGENTS.md"

          call_ai "You are updating CHANGELOG.md for this project.
          Based on the git diff, prepend a new entry at the very top using this exact format:

          ## [$(date +%Y-%m-%d)]

          ### Added
          - feature or change added
          - files/folders affected: path/to/file

          ### Removed
          - feature or change removed
          - files/folders affected: path/to/file

          ### Updated
          - feature or change updated
          - files/folders affected: path/to/file

          ---

          Rules:
          - NEVER modify or remove any existing entries below the new one
          - Only include sections (Added/Removed/Updated) that actually have changes in the diff
          - Be specific: mention the actual feature, component, or behavior that changed per bullet
          - Reference real file paths from the diff, not placeholders
          - Respond with the FULL file content (new entry at top + all existing entries unchanged)" "CHANGELOG.md"

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add AGENTS.md CHANGELOG.md

          git diff --staged --quiet && echo "No changes" || (
            git commit -m "AI: update AGENTS.md, CHANGELOG.md" &&
            git push origin HEAD:refs/heads/${{ github.head_ref }}
          )

      - name: Generate PR summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff origin/main...HEAD | head -c 8000 > diff.txt

          # Write payload to file to avoid JSON escaping issues
          node -e "
            const diff = require('fs').readFileSync('diff.txt', 'utf8');
            const payload = {
              model: 'gpt-4o',
              messages: [{ 
                role: 'user', 
                content: 'Analyze this git diff and generate a concise PR summary:\n\n' + diff 
              }]
            };
            require('fs').writeFileSync('payload.json', JSON.stringify(payload));
          "

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          SUMMARY=$(echo "$RESPONSE" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            if (d.error) { console.error('API Error:', d.error.message); process.exit(1); }
            console.log(d.choices[0].message.content);
          ")

          gh pr edit ${{ github.event.pull_request.number }} \
            --body "$SUMMARY"




          
